services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_SOCKET_URL: /
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bodaboda-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    restart: unless-stopped
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://bodaboda:bodaboda123@database:5432/bodaboda
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_key_change_this_in_production}
      - NODE_ENV=production
      - CORS_ORIGIN=http://localhost:8080
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => {process.exit(r.statusCode == 200 ? 0 : 1)}).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - bodaboda-network

  database:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    restart: unless-stopped
    environment:
      - POSTGRES_USER=bodaboda
      - POSTGRES_PASSWORD=bodaboda123
      - POSTGRES_DB=bodaboda
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bodaboda -d bodaboda"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - bodaboda-network

volumes:
  postgres-data:

networks:
  bodaboda-network:
    driver: bridge
