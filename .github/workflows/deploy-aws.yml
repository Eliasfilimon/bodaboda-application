name: Deploy to AWS

# Runs on every push to main OR manually from GitHub Actions tab
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION:   ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build backend Docker image and push to ECR
  # ─────────────────────────────────────────────────────────────────────────
  build-backend:
    name: 🐳 Build Backend → ECR
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push backend image
        id: build
        env:
          REPOSITORY: ${{ secrets.ECR_REPOSITORY_BACKEND }}
          IMAGE_TAG:  ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG ./backend
          docker push     $ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker tag      $ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG \
                          $ECR_REGISTRY/$REPOSITORY:latest
          docker push     $ECR_REGISTRY/$REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 — Deploy new backend image to ECS Fargate
  # ─────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: 🚀 Deploy Backend → ECS Fargate
    runs-on: ubuntu-latest
    needs: build-backend

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster  ${{ secrets.ECS_CLUSTER }} \
            --service  ${{ secrets.ECS_SERVICE_BACKEND }} \
            --force-new-deployment \
            --region   ${{ env.AWS_REGION }}

      - name: Wait for ECS service to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster  ${{ secrets.ECS_CLUSTER }} \
            --services ${{ secrets.ECS_SERVICE_BACKEND }} \
            --region   ${{ env.AWS_REGION }}

      # Print the ALB DNS so you can see the live backend URL in the Actions log
      - name: Print backend URL
        run: |
          ALB=$(aws elbv2 describe-load-balancers \
            --names bodaboda-alb \
            --query 'LoadBalancers[0].DNSName' \
            --output text 2>/dev/null || echo "no-alb-found")
          echo "✅ Backend live at: http://$ALB/api"

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3 — Build React app and deploy to S3 + CloudFront
  # ─────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: ⚛️  Build Frontend → S3 + CloudFront
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        env:
          # Baked into the JS bundle at build time
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_MQTT_WS: ${{ secrets.VITE_MQTT_WS }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # Assets (JS/CSS/images) — long cache, content-hashed filenames
      - name: Upload assets to S3
        run: |
          aws s3 sync ./dist s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --exclude "index.html" \
            --cache-control "max-age=31536000,immutable"

      # index.html — must NEVER be cached so users always get latest version
      - name: Upload index.html to S3 (no-cache)
        run: |
          aws s3 cp ./dist/index.html \
            s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Print frontend URL
        run: |
          CF=$(aws cloudfront get-distribution \
            --id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --query 'Distribution.DomainName' \
            --output text)
          echo "✅ Frontend live at: https://$CF"
