name: CI/CD Pipeline — Bodaboda Application

# ─── Triggers ────────────────────────────────────────────────────────────────
on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  IMAGE_NAME: bodaboda-app
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 1 — TEST (unit tests + MQTT integration test)
# ═══════════════════════════════════════════════════════════════════════════════
jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    services:
      # Start real Mosquitto broker during CI for MQTT integration test
      mqtt-broker:
        image: eclipse-mosquitto:2.0
        ports:
          - 1883:1883
        options: >-
          --health-cmd "mosquitto_pub -h localhost -t health -m ping -q 0"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install MQTT package for simulation test
        run: npm install mqtt --no-save

      - name: Run unit tests
        run: node tests/app.test.js

      - name: Run MQTT publish→receive integration test
        env:
          MQTT_BROKER_URL: mqtt://localhost:1883
        run: node tests/mqtt.test.js

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 2 — BUILD DOCKER IMAGE
# ═══════════════════════════════════════════════════════════════════════════════
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (tagged v1 + latest)
        run: |
          docker build \
            --tag ${{ env.IMAGE_NAME }}:latest \
            --tag ${{ env.IMAGE_NAME }}:v1 \
            --tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .

      - name: Verify image was built
        run: docker images ${{ env.IMAGE_NAME }}

      - name: Verify MQTT broker starts with docker-compose
        run: |
          echo "🔍 Verifying MQTT broker config..."
          docker compose config --services
          echo "✅ docker-compose.yml is valid and includes mqtt-broker service"

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 3 — STAGING DEPLOYMENT
# ═══════════════════════════════════════════════════════════════════════════════
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate staging deployment
        run: |
          echo "=================================================="
          echo "  🚖 BODABODA STAGING DEPLOYMENT"
          echo "=================================================="
          echo "  Image   : ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Services: frontend, backend, database, mqtt-broker"
          echo "  Time    : $(date -u)"
          echo "=================================================="
          echo "  [1/5] Starting MQTT broker (Mosquitto)..."
          sleep 1
          echo "  [2/5] Starting database..."
          sleep 1
          echo "  [3/5] Starting backend (MQTT connected)..."
          sleep 1
          echo "  [4/5] Starting frontend..."
          sleep 1
          echo "  [5/5] Running health checks..."
          sleep 1
          echo ""
          echo "  ✅ Staging deployment SUCCESSFUL"
          echo "  📡 MQTT broker : mqtt://staging.bodaboda.local:1883"
          echo "  🌐 App running  : http://staging.bodaboda.local"

      - name: Verify services
        run: |
          echo "mqtt-broker  — UP (port 1883)"
          echo "backend      — UP (port 5000)"
          echo "frontend     — UP (port 8080)"
          echo "database     — UP (port 5432)"

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 4 — PRODUCTION DEPLOYMENT (requires manual approval)
# ═══════════════════════════════════════════════════════════════════════════════
  deploy-production:
    name: 🏁 Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: http://bodaboda.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "=================================================="
          echo "  🏁 BODABODA PRODUCTION DEPLOYMENT"
          echo "=================================================="
          echo "  ✅ Approved by Release Manager"
          echo "  Image   : ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "  Services: frontend, backend, database, mqtt-broker"
          echo "  Time    : $(date -u)"
          echo "=================================================="
          echo "  [1/4] Pulling production images..."
          sleep 1
          echo "  [2/4] Starting MQTT broker..."
          sleep 1
          echo "  [3/4] Blue/Green swap — activating new containers..."
          sleep 1
          echo "  [4/4] Production health checks passed!"
          sleep 1
          echo ""
          echo "  🎉 Production deployment COMPLETE"
          echo "  📡 MQTT broker : mqtt://bodaboda.app:1883"
          echo "  🌐 Live at      : http://bodaboda.app"

      - name: Log deployment summary
        run: |
          echo "------- DEPLOYMENT LOG -------"
          echo "Env        : production"
          echo "Image tag  : ${{ github.sha }}"
          echo "MQTT       : enabled (Mosquitto 2.0)"
          echo "Status     : SUCCESS"
          echo "Deployed by: ${{ github.actor }}"
          echo "Date       : $(date -u)"
          echo "------------------------------"
