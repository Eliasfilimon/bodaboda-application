name: CI/CD Pipeline — Bodaboda Application

# ─── Triggers ────────────────────────────────────────────────────────────────
on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

# ─── Opt into Node.js 24 for all JS actions ──────────────────────────────────
env:
  IMAGE_NAME: bodaboda-app
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 1 — TEST
# Runs unit tests; pipeline fails if any test fails
# ═══════════════════════════════════════════════════════════════════════════════
jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: node tests/app.test.js

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 2 — BUILD DOCKER IMAGE
# Only runs after tests pass; builds & tags the image
# ═══════════════════════════════════════════════════════════════════════════════
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (tagged v1 + latest)
        run: |
          docker build \
            --tag ${{ env.IMAGE_NAME }}:latest \
            --tag ${{ env.IMAGE_NAME }}:v1 \
            --tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .

      - name: Verify image was built
        run: docker images ${{ env.IMAGE_NAME }}

      - name: Smoke-test container starts
        run: |
          docker run --rm --name bodaboda-test \
            -d ${{ env.IMAGE_NAME }}:latest || true
          sleep 3
          docker ps
          docker stop bodaboda-test 2>/dev/null || true

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 3 — STAGING DEPLOYMENT
# Automatically deploys after a successful build on main branch
# ═══════════════════════════════════════════════════════════════════════════════
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: http://staging.bodaboda.local

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate staging deployment
        run: |
          echo "=================================================="
          echo "  🚖 BODABODA STAGING DEPLOYMENT"
          echo "=================================================="
          echo "  Image   : ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Actor   : ${{ github.actor }}"
          echo "  Time    : $(date -u)"
          echo "=================================================="
          echo "  [1/4] Pulling latest image from registry..."
          sleep 1
          echo "  [2/4] Stopping existing staging container..."
          sleep 1
          echo "  [3/4] Starting new staging container..."
          sleep 1
          echo "  [4/4] Running health check..."
          sleep 1
          echo ""
          echo "  ✅ Staging deployment SUCCESSFUL"
          echo "  🌐 App running at http://staging.bodaboda.local"

      - name: Verify staging is running
        run: |
          echo "Health check: HTTP 200 OK"
          echo "Service: bodaboda-staging — UP"

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 4 — PRODUCTION DEPLOYMENT
# Requires manual approval from a reviewer (Release Manager) before running
# ═══════════════════════════════════════════════════════════════════════════════
  deploy-production:
    name: 🏁 Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: http://bodaboda.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "=================================================="
          echo "  🏁 BODABODA PRODUCTION DEPLOYMENT"
          echo "=================================================="
          echo "  ✅ Approved by Release Manager"
          echo "  Image   : ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Time    : $(date -u)"
          echo "=================================================="
          echo "  [1/4] Pulling production image..."
          sleep 1
          echo "  [2/4] Blue/Green swap — activating new container..."
          sleep 1
          echo "  [3/4] Draining old connections..."
          sleep 1
          echo "  [4/4] Production health check passed!"
          sleep 1
          echo ""
          echo "  🎉 Production deployment COMPLETE"
          echo "  🌐 Live at http://bodaboda.app"

      - name: Log deployment summary
        run: |
          echo "------- DEPLOYMENT LOG -------"
          echo "Env        : production"
          echo "Image tag  : ${{ github.sha }}"
          echo "Status     : SUCCESS"
          echo "Deployed by: ${{ github.actor }}"
          echo "Date       : $(date -u)"
          echo "------------------------------"
